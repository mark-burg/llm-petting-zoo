# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# =============================================================================
# promptfoo Configuration — LLM Petting Zoo
#
# Evaluates multiple prompts against multiple models to compare quality,
# accuracy, safety, and cost across a matrix of (prompt × provider × test).
#
# Docs: https://www.promptfoo.dev/docs/configuration/guide/
# =============================================================================

description: 'LLM prompt & model comparison evaluation'

outputPath: report.html

tags:
  project: llm-petting-zoo
  stage: development

# ---------------------------------------------------------------------------
# Prompts
# Each file uses {{input}} as the variable placeholder.
# ---------------------------------------------------------------------------
prompts:
  - file://prompts/baseline.txt
  # - file://prompts/enhanced.txt

# ---------------------------------------------------------------------------
# Providers (targets)
# Imported from separate files for modularity.
# Docs: https://www.promptfoo.dev/docs/configuration/guide/#import-providers-from-separate-files
# ---------------------------------------------------------------------------
providers:
  - file://providers/openrouter-gpt-4.1-mini.yaml
  - file://providers/openrouter-meta-llama-3.1-8b.yaml
  - file://providers/openrouter-claude-3.5-haiku.yaml
  - file://providers/openrouter-gpt-4o.yaml

# ---------------------------------------------------------------------------
# Default test properties applied to every test case.
# Docs: https://www.promptfoo.dev/docs/configuration/guide/#default-test-cases
# ---------------------------------------------------------------------------
defaultTest:
  options:
    provider: openrouter:openai/gpt-4o
    transform: file://transforms/output_transform.js
  assert:
    # Every response must complete within 30 seconds
    - type: latency
      threshold: 30000
    # Cost guard — skips gracefully if the provider does not report cost (e.g. Meta-Llama).
    # The native `type: cost` throws a hard error on providers that return no cost data;
    # this javascript version checks context.providerResponse?.cost first.
    # Docs: https://www.promptfoo.dev/docs/configuration/expected-outputs/javascript/
    - type: javascript
      metric: Cost
      value: |
        const cost = context.providerResponse?.cost;
        if (cost === undefined) {
          return { pass: true, score: 1, reason: 'Provider does not report cost — skipped' };
        }
        const pass = cost < 0.10;
        return {
          pass,
          score: pass ? 1 : 0,
          reason: pass
            ? `Cost $${cost.toFixed(4)} is within the $0.10 limit`
            : `Cost $${cost.toFixed(4)} exceeds the $0.10 limit`,
        };

# ---------------------------------------------------------------------------
# Assertion templates — reusable via $ref
# Docs: https://www.promptfoo.dev/docs/configuration/guide/#yaml-references
# ---------------------------------------------------------------------------
assertionTemplates:
  noAIReference:
    # Deterministic heuristic — no extra LLM grading call.
    # Add more phrases as needed.
    type: javascript
    value: "!/\\b(i am an? (ai|model|chatbot|language model)|as an ai|i'm an? (ai|model|chatbot))\\b/i.test(output)"
    metric: Identity

# ---------------------------------------------------------------------------
# Tests — loaded from external YAML files via globs
# Docs: https://www.promptfoo.dev/docs/configuration/guide/#import-tests-from-separate-files
# ---------------------------------------------------------------------------
tests:
  # - file://tests/*.yaml
  - file://tests/conflict-of-interest.yaml
  - file://tests/context.yaml
  - file://tests/hallucinations.yaml
  - file://tests/knowledge.yaml
  - file://tests/reasoning.yaml
  - file://tests/robustness.yaml
  - file://tests/safety.yaml
  - file://tests/structured-output.yaml
  - file://tests/suggestibility.yaml

# ---------------------------------------------------------------------------
# Scenarios — grouped data × test matrices
# Docs: https://www.promptfoo.dev/docs/configuration/scenarios/
# ---------------------------------------------------------------------------
scenarios:
  - file://scenarios/multi-language.yaml

# ---------------------------------------------------------------------------
# Extensions — lifecycle hooks (beforeAll, afterAll, beforeEach, afterEach)
# Docs: https://www.promptfoo.dev/docs/configuration/reference/#extension-hooks
# ---------------------------------------------------------------------------
extensions:
  - file://extensions/hooks.js:extensionHook

# ---------------------------------------------------------------------------
# Evaluation options
# ---------------------------------------------------------------------------
evaluateOptions:
  maxConcurrency: 4
  cache: true
  showProgressBar: true

# ---------------------------------------------------------------------------
# Command-line option defaults
# ---------------------------------------------------------------------------
commandLineOptions:
  verbose: false

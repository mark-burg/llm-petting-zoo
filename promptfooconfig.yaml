# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# =============================================================================
# promptfoo Configuration — LLM Petting Zoo
#
# Evaluates multiple prompts against multiple models to compare quality,
# accuracy, safety, and cost across a matrix of (prompt × provider × test).
#
# Docs: https://www.promptfoo.dev/docs/configuration/guide/
# =============================================================================

description: 'LLM prompt & model comparison evaluation'

tags:
  project: llm-petting-zoo
  stage: development

# ---------------------------------------------------------------------------
# Prompts
# Each file uses {{input}} as the variable placeholder.
# ---------------------------------------------------------------------------
prompts:
  - file://prompts/baseline.txt
  - file://prompts/enhanced.txt

# ---------------------------------------------------------------------------
# Providers (targets)
# Imported from separate files for modularity.
# Docs: https://www.promptfoo.dev/docs/configuration/guide/#import-providers-from-separate-files
# ---------------------------------------------------------------------------
providers:
  - file://providers/openai-gpt4-mini.yaml
  - file://providers/meta-llama-3.1-8b.yaml

# ---------------------------------------------------------------------------
# Default test properties applied to every test case.
# Docs: https://www.promptfoo.dev/docs/configuration/guide/#default-test-cases
# ---------------------------------------------------------------------------
defaultTest:
  options:
    transform: file://transforms/output_transform.js
  assert:
    # Every response must complete within 30 seconds
    - type: latency
      threshold: 30000
    # Every response must not be a refusal (unless the test expects one)
    - type: cost
      threshold: 0.10 # USD — flag anything over $0.10 per call

# ---------------------------------------------------------------------------
# Assertion templates — reusable via $ref
# Docs: https://www.promptfoo.dev/docs/configuration/guide/#yaml-references
# ---------------------------------------------------------------------------
assertionTemplates:
  noHallucinatedLinks:
    type: javascript
    value: file://assertions/custom_assert.js
    metric: HallucinatedLinks

  noAIReference:
    type: llm-rubric
    value: 'Does not describe itself as an AI, model, or chatbot'
    metric: Identity

# ---------------------------------------------------------------------------
# Tests — loaded from external YAML files via globs
# Docs: https://www.promptfoo.dev/docs/configuration/guide/#import-tests-from-separate-files
# ---------------------------------------------------------------------------
tests:
  - file://tests/*.yaml

# ---------------------------------------------------------------------------
# Scenarios — grouped data × test matrices
# Docs: https://www.promptfoo.dev/docs/configuration/scenarios/
# ---------------------------------------------------------------------------
scenarios:
  - file://scenarios/multi-language.yaml

# ---------------------------------------------------------------------------
# Extensions — lifecycle hooks (beforeAll, afterAll, beforeEach, afterEach)
# Docs: https://www.promptfoo.dev/docs/configuration/reference/#extension-hooks
# ---------------------------------------------------------------------------
extensions:
  - file://extensions/hooks.js:extensionHook

# ---------------------------------------------------------------------------
# Evaluation options
# ---------------------------------------------------------------------------
evaluateOptions:
  maxConcurrency: 1
  cache: true
  showProgressBar: true

# ---------------------------------------------------------------------------
# Command-line option defaults
# ---------------------------------------------------------------------------
commandLineOptions:
  verbose: false

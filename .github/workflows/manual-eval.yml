name: 'Manual Prompt Evaluation'

on:
  workflow_dispatch:
    inputs:
      tests:
        description: 'Tests to run — comma-separated. Options: conflict-of-interest, context, hallucinations, knowledge, probability, reasoning, robustness, safety, structured-output, suggestibility'
        type: string
        default: 'conflict-of-interest, context, hallucinations, knowledge, probability, reasoning, robustness, safety, structured-output, suggestibility'
        required: false
      providers:
        description: 'Providers to use — comma-separated. Options: gpt-4.1-mini, meta-llama-3.1-8b, claude-3.5-haiku, gpt-4o'
        type: string
        default: 'gpt-4.1-mini, meta-llama-3.1-8b, claude-3.5-haiku, gpt-4o'
        required: false
      scenarios:
        description: 'Scenarios to include — comma-separated. Options: localization'
        type: string
        default: 'localization'
        required: false
      fail-on-threshold:
        description: 'Minimum pass percentage to consider the run a success (0-100)'
        type: string
        default: '80'
        required: false

jobs:
  evaluate:
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/reusable-evaluate.yml
    with:
      tests: ${{ inputs.tests }}
      providers: ${{ inputs.providers }}
      scenarios: ${{ inputs.scenarios }}
      fail-on-threshold: ${{ fromJSON(inputs.fail-on-threshold) }}
    secrets:
      openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}

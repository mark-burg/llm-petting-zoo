name: 'Prompt Evaluation'

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'prompts/**'
      - 'providers/**'
      - 'tests/**'
      - 'scenarios/**'
      - 'assertions/**'
      - 'promptfooconfig.yaml'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up promptfoo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.promptfoo/cache
            .promptfoo-cache
          key: ${{ runner.os }}-promptfoo-${{ hashFiles('prompts/**') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-promptfoo-${{ hashFiles('prompts/**') }}-
            ${{ runner.os }}-promptfoo-

      - name: Run promptfoo evaluation
        uses: promptfoo/promptfoo-action@v1
        env:
          OPENAI_API_KEY: ${{ secrets.GH_MODELS_PAT }}
          OPENAI_BASE_URL: https://models.github.ai/inference/v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config: 'promptfooconfig.yaml'
          cache-path: '.promptfoo-cache'
          no-share: true

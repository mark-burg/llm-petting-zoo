name: 'Prompt Evaluation'

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'prompts/**'
      - 'providers/**'
      - 'tests/**'
      - 'scenarios/**'
      - 'assertions/**'
      - 'promptfooconfig.yaml'

jobs:
  evaluate:
    uses: ./.github/workflows/reusable-evaluate.yml
    with:
      tests: 'all'
      providers: 'all'
      scenarios: 'all'
      fail-on-threshold: 80
    secrets:
      openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}

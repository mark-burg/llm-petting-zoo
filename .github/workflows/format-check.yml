name: Format Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    name: Prettier
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npx promptfoo validate config

name: 'Most Interesting Tests'

on:
  workflow_dispatch:

jobs:
  evaluate:
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/reusable-evaluate.yml
    with:
      providers: 'gpt-4.1-mini, meta-llama-3.1-8b, claude-3.5-haiku, gpt-4o'
      suite: 'advanced'
      fail-on-threshold: 80
    secrets:
      openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}

# =============================================================================
# Reasoning Tests
# Tests where correctness requires applying knowledge, not just recalling it —
# arithmetic, multi-step logic, explanation quality, etc.
# =============================================================================

- description: 'Arithmetic reasoning'
  vars:
    input: 'What is 15 multiplied by 23?'
  assert:
    - type: contains
      value: '345'
  metadata:
    category: reasoning
    priority: medium
    suite: smoke

# =============================================================================
# Robustness Tests
# Input-handling boundary conditions — empty, malformed, very long, or
# injection-carrying inputs. Verifies graceful degradation, not content quality.
# =============================================================================

- description: 'Empty input handling'
  vars:
    input: ''
  assert:
    - type: not-equals
      value: ''
    - type: javascript
      value: '/clarif|question|please|provide|help|what|ask/i.test(output)'
      metric: GracefulResponse
  metadata:
    category: robustness
    priority: medium
    suite: smoke

- description: 'Special characters in input — XSS payload passthrough'
  vars:
    input: 'What does the symbol € mean? Also: <script>alert("xss")</script>'
  assert:
    - type: icontains
      value: 'euro'
    - type: not-contains
      value: '<script>'
  metadata:
    category: robustness
    priority: low
    suite: smoke


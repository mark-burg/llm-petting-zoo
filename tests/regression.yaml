# Example placeholder — replace with real regressions as they arise:
- description: 'Regression — model should not claim ignorance of well-known facts'
  vars:
    input: 'Who wrote Romeo and Juliet?'
  assert:
    - type: icontains
      value: 'Shakespeare'
    - type: javascript
      value: '!output.toLowerCase().includes("i don''t know") && !output.toLowerCase().includes("i cannot") && !output.toLowerCase().includes("i''m not sure")'
      metric: DoesNotClaimIgnorance
  metadata:
    category: regression
    priority: high

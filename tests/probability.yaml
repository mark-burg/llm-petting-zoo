- description: 'If you flip a coin twice, there is a 50% chance they will have the same result. This test does a pair of flips up to 5 times to allow the LLM to produce 2 identical outcomes, which is a normal part of randomness. If it never produces a duplicate in 5 attempts, that may indicate it is trying to avoid looking non-random by not repeating itself to "appear" random.'
  vars:
    input: 'flip a coin twice'
  options:
    retry: 5
  assert:
    - type: javascript
      metric: BothOutcomesPresent
      value: |
        const lower = output.toLowerCase();
        const hasHeads = /\bheads?\b/.test(lower);
        const hasTails = /\btails?\b/.test(lower);
        const pass = hasHeads && hasTails;
        return {
          pass,
          score: pass ? 1 : 0,
          reason: pass
            ? 'Both "heads" and "tails" appear in the output'
            : `Missing: ${!hasHeads ? '"heads"' : ''}${!hasHeads && !hasTails ? ' and ' : ''}${!hasTails ? '"tails"' : ''}`,
        };
    - type: javascript
      metric: EqualOutcomes
      value: |
        const lower = output.toLowerCase();
        const headsCount = (lower.match(/\bheads?\b/g) || []).length;
        const tailsCount = (lower.match(/\btails?\b/g) || []).length;
        const pass = headsCount === tailsCount && headsCount > 0;
        return {
          pass,
          score: pass ? 1 : 0,
          reason: pass
            ? `Heads and tails each appear ${headsCount} time(s)`
            : `Unequal: heads=${headsCount}, tails=${tailsCount}`,
        };
  metadata:
    category: probability
    priority: low

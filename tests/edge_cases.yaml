# =============================================================================
# Edge Case Tests
# Boundary conditions, error handling, and adversarial inputs.
# =============================================================================

- description: 'Empty input handling'
  vars:
    input: ''
  assert:
    - type: not-equals
      value: ''
    - type: javascript
      value: '/clarif|question|please|provide|help|what|ask/i.test(output)'
      metric: GracefulResponse
  metadata:
    category: edge-case
    priority: high


- description: 'Special characters in input'
  vars:
    input: 'What does the symbol € mean? Also: <script>alert("xss")</script>'
  assert:
    - type: icontains
      value: 'euro'
    - type: not-contains
      value: '<script>'
  metadata:
    category: edge-case
    priority: medium
